---

# Taken from: https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/

name: release

env:
  python_version: "3.x"

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:


jobs:
  release-stm32-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          show-progress: false

      - name: Disable wget progress output
        run: |
          echo "verbose = off" >> $HOME/.wgetrc

      - name: Install toolchains
        run: sudo apt-get install -y gcc-arm-none-eabi gcc-riscv64-unknown-elf

      - name: Build stm32
        working-directory: ./embedded/stm32
        run: ./build_all.sh

      - uses: action/upload-artifact@v4
        with:
          name: stm32-build
          path: "embedded/stm32/**/build/"

  ci-esp32-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          show-progress: false

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.python_version }}

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build release
        working-directory: ./embedded/esp32
        run: pio run -e release

      - uses: actions/upload-artifact@v7
        with:
          name: esp32-build
          path: embedded/esp32/.pio/build

  release-python-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          show-progress: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.python_version }}
          cache: "pip"

      - name: Install package
        working-directory: python
        run: pip install --force -e .[dev]

      - name: Format python
        working-directory: python
        run: ./build.sh

      - name: Store the distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: python/dist/

  publish-to-pypi:
    needs:
      - release-python-build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ents
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: >-
      Sign the Python distribution with Sigstore
      and upload them to GitHub Release
    needs:
      - publish-to-pypi
      - release-stm32-build
      - ci-esp32-build

    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: python/

      - uses: actions/download-artifact@v8
        with:
          name: stm32-build
          path: stm32/

      - uses: actions/download-artifact@v8
        with:
          name: esp32-build
          path: esp32/

      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: >-
            ./python/*.tar.gz
            ./python/*.whl

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create
          '${{ github.ref_name }}'
          --repo '${{ github.repository }}'
          --notes ""

      - name: Upload artifact signatures to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        # Upload to GitHub Release using the `gh` CLI.
        # `dist/` contains the built packages, and the
        # sigstore-produced signatures and certificates.
        run: >-
          gh release upload
          '${{ github.ref_name }}' python/** stm32/** esp32/**
          --repo '${{ github.repository }}'

  publish-to-testpypi:
    if: github.event_name == 'workflow_dispatch'
    name: Publish Python distribution to TestPyPI
    needs:
      - release-python-build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/ents

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
